<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Search Engine Reina Palus</title>

<style>

/* Body */
body{
    font-family: Arial, sans-serif;
    margin: 0;
    text-align: center;
    background: linear-gradient(to right,#eef2f3,#dfe9f3);
}

/* Header seperti Google */
.header{
    display: flex;
    justify-content: flex-end;
    padding: 15px 30px;
}

.header a{
    margin-left: 20px;
    text-decoration: none;
    color: #333;
}

.header a:hover{
    text-decoration: underline;
}

/* Profil bulat */
.profil{
    width: 30px;
    height: 30px;
    background: #2c3e50;
    color: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-left: 20px;
}

/* Container utama */
.container{
    margin-top: 120px;
}

/* Judul */
h1{
    font-size: 42px;
    color: #2c3e50;
}

/* Search bar */
input[type="text"]{
    width: 450px;
    padding: 12px;
    font-size: 16px;
    border-radius: 25px;
    border: 1px solid #ccc;
    outline: none;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

/* Tombol */
button{
    margin-top: 15px;
    padding: 10px 25px;
    font-size: 16px;
    background-color: #2c3e50;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

button:hover{
    background-color: #34495e;
}

/* Footer */
footer{
    margin-top: 120px;
    color: #555;
}

</style>
</head>

<body>

<!-- Header -->
<div class="header">
<a href="#">Gmail</a>
<a href="#">Gambar</a>
<div class="profil">MtN</div>
</div>

<!-- Bagian Tengah -->
<div class="container">

<h1>Se🔍rch.R</h1>

<p>Mencari Informasi Lebih Mudah</p>

<!-- Form diarahkan ke Google -->
<form action="https://www.google.com/search" method="GET">

<input type="text" name="q" placeholder="Telusuri...">

<br>

<button type="submit">Cari🔍</button>

</form>

</div>

<footer>
<p>Reina Palus 2026</p>
</footer>

</body>
</html>
