<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Search Engine Reina Palus</title>

<style>

/* Body */
body{
    font-family: Arial, sans-serif;
    margin:0;
    text-align:center;
    background: linear-gradient(135deg,#f09c82d3,#6c4198);
}

/* Header */
.header{
    display:flex;
    justify-content:flex-end;
    padding:15px 30px;
    font-size:14px;
}

.header a{
    margin-left:20px;
    text-decoration:none;
    color:rgb(252, 250, 250);
}

.header a:hover{
    text-decoration:underline;
}

/* Profil */
.profil{
    width:30px;
    height:30px;
    background:#b7efb5aa;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    margin-left:20px;
}

/* Container */
.container{
    margin-top:120px;
}

/* Kotak utama */
.box{
    background:rgb(255, 255, 255);
    width:650px;
    margin:auto;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(243, 162, 218, 0.731);
}

/* Judul */
h1{
    font-size:50px;
    color:#f479c5e1;
}

/* Search Box */
.search-box{
    display:flex;
    justify-content:center;
    margin-top:25px;
}

/* Input pencarian */
.search-box input{
    width:350px;
    padding:12px;
    font-size:16px;
    border-radius:25px 0 0 25px;
    border:1px solid #9534ad48;
    outline:none;
}

/* Tombol cari menyatu */
.btn-cari{
    padding:12px 20px;
    border:none;
    background:#b656dfa4;
    color:white;
    font-size:16px;
    border-radius:0 25px 25px 0;
    cursor:pointer;
    font-weight:bold;
}

/* Hover tombol */
.btn-cari:hover{
    background:#9534ad;
}

/* Kata kunci Paling Sering */
.popular{
    margin-top:25px;
}

.tag{
    display:inline-block;
    padding:6px 12px;
    margin:5px;
    background:#f1f1f1;
    border-radius:15px;
    font-size:13px;
    cursor:pointer;
}

.tag:hover{
    background:#9534ad;
    color:rgb(255, 255, 255);
}

/* Footer */
footer{
    margin-top:120px;
    color:white;
    font-size:14px;
}

</style>
</head>

<body>

<!-- Header -->
<div class="header">
<a href="#">Gmail</a>
<a href="#">Gambar</a>
<div class="profil">MtN</div>
</div>

<!-- Konten Tengah -->
<div class="container">

<div class="box">

<h1>Se🔍rch.R</h1>

<p>Mencari Informasi Lebih Mudah</p>

<form action="https://www.google.com/search" method="GET">

<div class="search-box">
<input type="text" name="q" placeholder="Telusuri...">
<button class="btn-cari" type="submit">Cari🔍</button>
</div>

</div>

<footer>

</body>
</html>
